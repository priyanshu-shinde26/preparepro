name: preparepro
description: AI-Based Campus Placement Preparation App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase ────────────────────────────────────────────────────────────────
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # ── Google Sign-In (works on Web, Android, iOS, macOS, Windows) ─────────────
  google_sign_in: ^6.2.1

  # ── State Management ────────────────────────────────────────────────────────
  flutter_riverpod: ^2.4.9

  # ── Navigation ──────────────────────────────────────────────────────────────
  go_router: ^13.2.0

  # ── UI & Design ─────────────────────────────────────────────────────────────
  google_fonts: ^6.1.0
  fl_chart: ^0.66.0
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0

  # ── Networking ──────────────────────────────────────────────────────────────
  dio: ^5.4.0

  # ── Storage & Cache ─────────────────────────────────────────────────────────
  shared_preferences: ^2.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1

  # ── PDF Generation ──────────────────────────────────────────────────────────
  pdf: ^3.10.7
  printing: ^5.12.0
  path: ^1.9.0

  # ── Utilities ───────────────────────────────────────────────────────────────
  uuid: ^4.2.2
  intl: ^0.19.0
  connectivity_plus: ^6.0.3
  share_plus: ^10.0.0
  flutter_markdown: ^0.7.7+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.7
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/